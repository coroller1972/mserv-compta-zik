kind: ImageStream
apiVersion: image.openshift.io/v1
metadata:
  name: mserv-compta-zik
  labels:
    app: compta-zik-app
---
kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: mserv-compta-zik
  labels:
    app: compta-zik-app
spec:
  source:
    type: Git
    git:
      uri: https://github.com/coroller1972/mserv-compta-zik.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: src/main/docker/Dockerfile.jvm.staged
  output:
    to:
      kind: ImageStreamTag
      name: mserv-compta-zik:1.0
  triggers: []
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: mserv-compta-zik
  labels:
    app: compta-zik-app
  annotations:
    image.openshift.io/triggers: >-
      [{"from":{"kind":"ImageStreamTag","name":"mserv-compta-zik:1.0"},"fieldPath":"spec.template.spec.containers[?(@.name==\"mserv-compta-zik\")].image"}]
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compta-zik-app
  template:
    metadata:
      labels:
        app: compta-zik-app
    spec:
      containers:
        - name: mserv-compta-zik
          image: mserv-compta-zik:1.0
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: QUARKUS_DATASOURCE_REACTIVE_URL
              valueFrom:
                secretKeyRef:
                  name: mserv-compta-zik-db
                  key: reactive-url
            - name: QUARKUS_DATASOURCE_JDBC_URL
              valueFrom:
                secretKeyRef:
                  name: mserv-compta-zik-db
                  key: jdbc-url
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mserv-compta-zik-db
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mserv-compta-zik-db
                  key: password
          volumeMounts:
            - name: documents
              mountPath: /documents
          startupProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            tcpSocket:
              port: 8081
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: documents
          persistentVolumeClaim:
            claimName: mserv-compta-zik-documents
---
kind: Service
apiVersion: v1
metadata:
  name: mserv-compta-zik-svc
  labels:
    app: compta-zik-app
spec:
  ports:
    - name: http-8081
      port: 8081
      protocol: TCP
      targetPort: 8081
  selector:
    app: compta-zik-app
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: mserv-compta-zik-documents
  labels:
    app: compta-zik-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: mserv-compta-zik
  labels:
    app: compta-zik-app
spec:
  to:
    kind: Service
    name: mserv-compta-zik-svc
  port:
    targetPort: http-8081
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
