quarkus.application.name=mserv-compta
quarkus.http.port=8081
quarkus.http.root-path=/api
#Database
quarkus.datasource.reactive.max-size=20
quarkus.hibernate-orm.mapping.format.global=ignore
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.reactive.url=postgresql://localhost:5432/zik
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/zik
%dev.quarkus.datasource.password=c0Qk5UJLMnWLSXoXtNS5X
%dev.quarkus.datasource.username=postgres
%dev.quarkus.hibernate-orm.log.sql=true
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.reactive.url=postgresql://localhost:5432/compta_db
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/compta_db
%prod.quarkus.datasource.password=compta_app
%prod.quarkus.datasource.username=compta_app
# CORS specific
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=http://localhost:4173
%dev.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
%dev.quarkus.http.cors.headers=Content-Type,Authorization
#business course config in hour
compta.billing.individual-course=0.5
compta.billing.workshop=1.25
compta.documents.storage-dir=documents
%prod.compta.documents.storage-dir=/documents
