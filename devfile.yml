schemaVersion: 2.2.0
metadata:
  name: mserv-compta-zik
  version: 1.2.1
  provider: Red Hat
  supportUrl: https://github.com/devfile-samples/devfile-support#support-information
  icon: https://design.jboss.org/quarkus/logo/final/SVG/quarkus_icon_rgb_default.svg
  website: https://quarkus.io
  displayName: mserv-compta-zik
  description: Quarkus Kotlin service for compta-zik
  tags:
    - Kotlin
    - Quarkus
  projectType: Quarkus
  language: Kotlin
  attributes:
    alpha.dockerimage-port: 8081
parent:
  id: java-quarkus
  registryUrl: 'https://registry.devfile.io'
  version: 1.4.0
components:
  - name: image-build
    image:
      imageName: mserv-compta-zik:1.0
      dockerfile:
        uri: src/main/docker/Dockerfile.jvm.staged
        buildContext: .
        rootRequired: true
  - name: kubernetes-deploy
    attributes:
      deployment/replicas: 1
      deployment/cpuRequest: 100m
      deployment/memoryRequest: 512Mi
      deployment/container-port: 8081
    kubernetes:
      uri: deploy.yml
      endpoints:
        - name: http-8081
          targetPort: 8081
          path: /api
          secure: true
commands:
  - id: build-image
    apply:
      component: image-build
  - id: deployk8s
    apply:
      component: kubernetes-deploy
  - id: deploy
    composite:
      commands:
        - build-image
        - deployk8s
      group:
        kind: deploy
        isDefault: true
